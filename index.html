<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jordan Hilliard | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --spacing: 20px;
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px;
            position: sticky;
            top: 0;
            background: white;
            z-index: 100;
        }

        .nav-left a, .nav-right a {
            text-decoration: none;
            color: var(--text-color);
            font-weight: 700;
        }

        .nav-right { display: flex; gap: 25px; align-items: center; }

        /* FIXED GRID LOGIC: This ensures 001, 002, 003 stay on the same horizontal line */
        #work-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: var(--spacing);
            padding: 0 var(--spacing) var(--spacing) var(--spacing);
            max-width: 2400px;
            margin: 0 auto;
            align-items: end; /* This aligns the bottom of the images in each row, looking much cleaner */
        }

        .project-item {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        .project-item img {
            width: 100%;
            height: auto;
            display: block;
        }

        .project-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Responsive: 2 cols for tablet, 1 for mobile */
        @media (max-width: 1000px) {
            #work-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 700px) { 
            #work-grid { grid-template-columns: 1fr; }
            nav { padding: 20px; flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left"><a href="index.html">Jordan Hilliard</a></div>
        <div class="nav-right">
            <a href="index.html">Selected Work</a>
            <a href="about.html">About</a>
            <a href="mailto:YOUR_EMAIL@GMAIL.COM"><i class="fa-solid fa-envelope"></i></a>
            <a href="https://www.linkedin.com/in/YOUR_PROFILE" target="_blank"><i class="fa-brands fa-linkedin"></i></a>
        </div>
    </nav>

    <main id="work-grid">
        </main>

    <script>
        const username = 'JDHilliard-lab';
        const repo = 'jordanhilliartportfolio';

        async function loadImages() {
            const grid = document.getElementById('work-grid');
            try {
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/images`);
                const files = await response.json();
                
                // Sort strictly by the numbers in your screenshot
                files.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));

                files.forEach(file => {
                    if (file.name.toLowerCase().endsWith('.webp')) {
                        const div = document.createElement('div');
                        div.className = 'project-item';
                        div.innerHTML = `<img src="${file.download_url}" alt="${file.name}">`;
                        grid.appendChild(div);
                        observer.observe(div);
                    }
                });
            } catch (e) { console.error(e); }
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        }, { threshold: 0.1 });

        loadImages();
    </script>
</body>
</html>
