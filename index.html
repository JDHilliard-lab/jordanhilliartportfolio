<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jordan Hilliard | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --spacing: 20px; /* Equal spacing between images */
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        /* Navbar Styling */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 40px;
            position: sticky;
            top: 0;
            background: white;
            z-index: 100;
        }

        .nav-left a, .nav-right a {
            text-decoration: none;
            color: var(--text-color);
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .nav-left a { font-size: 1.2rem; font-weight: 700; }
        .nav-right { display: flex; gap: 25px; align-items: center; }
        .nav-right a:hover { opacity: 0.6; }

        /* The Masonry Grid (Updated from Grid to Columns) */
        #work-grid {
            column-count: 3; /* Desktop: 3 Columns */
            column-gap: var(--spacing);
            padding: 0 var(--spacing) var(--spacing) var(--spacing);
            max-width: 100%;
            margin: 0 auto;
        }

        .project-item {
            display: inline-block; /* Required for masonry flow */
            width: 100%;
            margin-bottom: var(--spacing); /* Equal vertical spacing */
            opacity: 0; /* Hidden for fade-in */
            transform: translateY(20px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
            background: #f9f9f9;
        }

        /* Dynamic Image Fit: No cropping, scales to width */
        .project-item img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Fade-in Class */
        .project-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Responsive: Adjust columns for smaller screens */
        @media (max-width: 1000px) {
            #work-grid { column-count: 2; }
        }

        @media (max-width: 600px) {
            #work-grid { column-count: 1; }
            nav { 
                padding: 20px; 
                flex-direction: column; 
                gap: 15px; 
                text-align: center;
            }
            .nav-right { gap: 15px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <a href="index.html">Jordan Hilliard</a>
        </div>
        <div class="nav-right">
            <a href="index.html">Selected Work</a>
            <a href="about.html">About</a>
            <a href="mailto:YOUR_EMAIL@GMAIL.COM"><i class="fa-solid fa-envelope"></i></a>
            <a href="https://www.linkedin.com/in/YOUR_PROFILE" target="_blank"><i class="fa-brands fa-linkedin"></i></a>
        </div>
    </nav>

    <main id="work-grid">
        </main>

    <script>
        const username = 'JDHilliard-lab';
        const repo = 'jordanhilliartportfolio';

        async function loadImages() {
            const grid = document.getElementById('work-grid');
            try {
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/images`);
                const files = await response.json();
                
                // Sort 001, 002, etc.
                files.sort((a, b) => a.name.localeCompare(b.name));

                files.forEach(file => {
                    if (file.name.toLowerCase().endsWith('.webp')) {
                        const div = document.createElement('div');
                        div.className = 'project-item';
                        div.innerHTML = `<img src="${file.download_url}" loading="lazy">`;
                        grid.appendChild(div);
                        
                        // Observe for fade-in
                        observer.observe(div);
                    }
                });
            } catch (e) { console.error("Error loading images:", e); }
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1 });

        loadImages();
    </script>
</body>
</html>
