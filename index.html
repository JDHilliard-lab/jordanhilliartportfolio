<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jordan Hilliard | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --spacing: 20px; /* Equal spacing between images */
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            -webkit-font-smoothing: antialiased;
        }

        /* Navbar Styling */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px;
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            z-index: 100;
        }

        .nav-left a, .nav-right a {
            text-decoration: none;
            color: var(--text-color);
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .nav-left a { 
            font-size: 1.2rem; 
            font-weight: 700; 
            letter-spacing: -0.5px;
        }
        
        .nav-right { 
            display: flex; 
            gap: 25px; 
            align-items: center; 
        }
        
        .nav-right a:hover { 
            opacity: 0.5; 
        }

        /* The Grid: 3 Columns, Left-to-Right Flow */
        #work-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: var(--spacing);
            padding: 0 var(--spacing) var(--spacing) var(--spacing);
            align-items: start; /* Keeps row tops aligned */
            max-width: 1800px;
            margin: 0 auto;
        }

        .project-item {
            opacity: 0; /* Hidden for fade-in */
            transform: translateY(30px);
            transition: opacity 0.8s cubic-bezier(0.2, 0, 0.2, 1), 
                        transform 0.8s cubic-bezier(0.2, 0, 0.2, 1);
        }

        /* Dynamic Image Fit: No Cropping */
        .project-item img {
            width: 100%;
            height: auto; 
            display: block;
            transition: transform 0.5s ease;
        }

        /* Hover effect: subtle lift */
        .project-item:hover img {
            transform: scale(1.01);
        }

        /* Fade-in Class triggered by JS */
        .project-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Responsive Breakpoints */
        @media (max-width: 1100px) {
            #work-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 700px) {
            #work-grid { grid-template-columns: 1fr; }
            nav { 
                padding: 20px; 
                flex-direction: column; 
                gap: 20px; 
                text-align: center;
            }
            .nav-right { gap: 20px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <a href="index.html">Jordan Hilliard</a>
        </div>
        <div class="nav-right">
            <a href="index.html">Selected Work</a>
            <a href="about.html">About</a>
            <a href="mailto:YOUR_EMAIL@GMAIL.COM" title="Email Me">
                <i class="fa-solid fa-envelope"></i>
            </a>
            <a href="https://www.linkedin.com/in/YOUR_PROFILE" target="_blank" title="LinkedIn">
                <i class="fa-brands fa-linkedin"></i>
            </a>
        </div>
    </nav>

    <main id="work-grid">
        </main>

    <script>
        const username = 'JDHilliard-lab';
        const repo = 'jordanhilliartportfolio';

        async function loadImages() {
            const grid = document.getElementById('work-grid');
            try {
                // Fetch the contents of the /images folder
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/images`);
                const files = await response.json();
                
                // Sort numerically based on your 001, 002, 003 naming
                files.sort((a, b) => a.name.localeCompare(b.name));

                files.forEach(file => {
                    // Check for .webp files
                    if (file.name.toLowerCase().endsWith('.webp')) {
                        const div = document.createElement('div');
                        div.className = 'project-item';
                        
                        // Using download_url to pull the raw image file
                        div.innerHTML = `<img src="${file.download_url}" alt="Project Image" loading="lazy">`;
                        
                        grid.appendChild(div);
                        
                        // Observe this element for the fade-in effect
                        observer.observe(div);
                    }
                });
            } catch (error) {
                console.error("Could not load images from GitHub API:", error);
            }
        }

        // Intersection Observer for the smooth scroll-in animation
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { 
            threshold: 0.05, // Trigger when 5% of the image is visible
            rootMargin: "0px 0px -50px 0px" // Slight delay for smoother feel
        });

        // Initialize the gallery
        loadImages();
    </script>
</body>
</html>
