<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jordan Hilliard | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --spacing: 15px;
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px;
            position: sticky;
            top: 0;
            background: white;
            z-index: 100;
        }

        .nav-left a, .nav-right a {
            text-decoration: none;
            color: var(--text-color);
            font-weight: 700;
        }

        .nav-right { display: flex; gap: 25px; align-items: center; }

        /* The Grid Container */
        #work-container {
            display: flex;
            flex-direction: row;
            gap: var(--spacing);
            padding: 0 var(--spacing) var(--spacing) var(--spacing);
            max-width: 2400px;
            margin: 0 auto;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: var(--spacing);
            flex: 1;
        }

        .project-item {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        .project-item img {
            width: 100%;
            height: auto;
            display: block;
        }

        .project-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 1000px) { #col-2 { display: none; } }
        @media (max-width: 700px) { 
            #col-1 { display: none; } 
            nav { padding: 20px; flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left"><a href="index.html">Jordan Hilliard</a></div>
        <div class="nav-right">
            <a href="index.html">Selected Work</a>
            <a href="about.html">About</a>
            <a href="mailto:YOUR_EMAIL@GMAIL.COM"><i class="fa-solid fa-envelope"></i></a>
            <a href="https://www.linkedin.com/in/YOUR_PROFILE" target="_blank"><i class="fa-brands fa-linkedin"></i></a>
        </div>
    </nav>

    <main id="work-container">
        <div class="column" id="col-0"></div>
        <div class="column" id="col-1"></div>
        <div class="column" id="col-2"></div>
    </main>

    <script>
        const username = 'JDHilliard-lab';
        const repo = 'jordanhilliartportfolio';

        async function loadImages() {
            try {
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/images`);
                const files = await response.json();
                
                // 1. Sort strictly by your numbering (001, 002, etc)
                files.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true, sensitivity: 'base'}));

                const webpFiles = files.filter(f => f.name.toLowerCase().endsWith('.webp'));

                const getColCount = () => {
                    if (window.innerWidth <= 700) return 1;
                    if (window.innerWidth <= 1000) return 2;
                    return 3;
                };

                const columnCount = getColCount();

                webpFiles.forEach((file, index) => {
                    const div = document.createElement('div');
                    div.className = 'project-item';
                    div.innerHTML = `<img src="${file.download_url}" alt="${file.name}">`;
                    
                    // 2. The "Sticking" Logic: 
                    // Instead of index % 3, we fill columns in a way that keeps numbers grouped.
                    // This finds the shortest column and adds the next image to it.
                    const cols = [
                        document.getElementById('col-0'),
                        document.getElementById('col-1'),
                        document.getElementById('col-2')
                    ].slice(0, columnCount);

                    // Find which column currently has the fewest items to keep them balanced
                    const shortestCol = cols.reduce((p, c) => p.children.length <= c.children.length ? p : c);
                    
                    shortestCol.appendChild(div);
                    observer.observe(div);
                });
            } catch (e) { console.error(e); }
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        }, { threshold: 0.1 });

        loadImages();

        window.addEventListener('resize', () => {
            clearTimeout(window.rt);
            window.rt = setTimeout(() => location.reload(), 200);
        });
    </script>
</body>
</html>
