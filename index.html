<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jordan Hilliard | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* GLOBAL RESET */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            -webkit-font-smoothing: antialiased;
        }
        * { box-sizing: border-box; }

        :root {
            --spacing: 15px;
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --nav-height: 100px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        /* SYNCED NAVBAR */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: var(--nav-height);
            padding: 0 40px;
            position: sticky;
            top: 0;
            background: white;
            z-index: 1000;
        }

        .nav-left a, .nav-right a {
            text-decoration: none;
            color: var(--text-color);
            font-weight: 700;
            font-size: 1rem;
        }

        .nav-left a { font-size: 1.2rem; }
        .nav-right { display: flex; gap: 25px; align-items: center; }
        .nav-right a:hover { opacity: 0.5; }

        /* --- THE JUSTIFIED ASPECT-RATIO GALLERY --- */
        #portfolio-main {
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing);
            padding: 0 var(--spacing) 60px var(--spacing);
            max-width: 2400px;
            margin: 0 auto;
        }

        /* INVISIBLE SHIELD: This stops the very last row from stretching massively out of proportion if there are only 1 or 2 images left in it! */
        #portfolio-main::after {
            content: "";
            flex-grow: 999999999;
        }

        .project-item {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
            /* Flex-grow and Flex-basis will be injected dynamically by JS */
        }

        .project-item img {
            width: 100%;
            height: auto; 
            display: block;
        }

        .project-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* RESPONSIVE */
        @media (max-width: 700px) { 
            nav { padding: 0 20px; height: 80px; }
            .nav-left a { font-size: 1rem; }
            .nav-right { gap: 15px; }
            .nav-right a { font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-left"><a href="index.html">Jordan Hilliard</a></div>
        <div class="nav-right">
            <a href="index.html">Work</a>
            <a href="about.html">About</a>
            <a href="mailto:jordanhilliard@gmail.com"><i class="fa-solid fa-envelope"></i></a>
            <a href="https://www.linkedin.com/in/jordan-hilliard-50a4322/" target="_blank"><i class="fa-brands fa-linkedin"></i></a>
        </div>
    </nav>

    <main id="portfolio-main"></main>

    <script>
        const username = 'JDHilliard-lab';
        const repo = 'jordanhilliartportfolio';

        // Set how tall you roughly want your rows to be. 
        // 350px on desktop, 200px on mobile so they stack nicely.
        const targetRowHeight = window.innerWidth <= 700 ? 200 : 350;

        async function loadImages() {
            try {
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/images`);
                const files = await response.json();
                
                // 1. Sort files chronologically (001, 002, etc.)
                files.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));

                // 2. Filter out non-webps and portraits
                const webpFiles = files.filter(f => 
                    f.name.toLowerCase().endsWith('.webp') && 
                    f.name.toLowerCase() !== 'portrait.webp'
                );

                // 3. Group files by project (so Ford stays near Ford)
                const groups = { 'Ford': [], 'Aloft': [], 'EY': [], 'Other Work': [] };
                webpFiles.forEach(file => {
                    const lowerName = file.name.toLowerCase();
                    if (lowerName.includes('ford')) { groups['Ford'].push(file); }
                    else if (lowerName.includes('aloft')) { groups['Aloft'].push(file); }
                    else if (lowerName.includes('ey')) { groups['EY'].push(file); }
                    else { groups['Other Work'].push(file); }
                });

                // 4. Flatten the groups back into ONE master list so they can blend at the edges
                const masterList = [
                    ...groups['Ford'], 
                    ...groups['Aloft'], 
                    ...groups['EY'], 
                    ...groups['Other Work']
                ];

                const mainContainer = document.getElementById('portfolio-main');

                // 5. Render them all into the single fluid grid
                masterList.forEach((file) => {
                    const div = document.createElement('div');
                    div.className = 'project-item';
                    
                    const img = document.createElement('img');
                    img.src = file.download_url;
                    img.alt = file.name;

                    // THE MATH TRICK: When the image loads, calculate its aspect ratio and size the box perfectly
                    img.onload = function() {
                        const aspectRatio = img.naturalWidth / img.naturalHeight;
                        div.style.flexGrow = aspectRatio;
                        div.style.flexBasis = (targetRowHeight * aspectRatio) + 'px';
                    };

                    div.appendChild(img);
                    mainContainer.appendChild(div);
                    observer.observe(div);
                });

            } catch (e) { console.error(e); }
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
        }, { threshold: 0.1 });

        loadImages();

        // Mobile address bar & desktop resize fix
        let currentWidth = window.innerWidth;
        let rt;
        window.addEventListener('resize', () => {
            clearTimeout(rt);
            rt = setTimeout(() => {
                if (window.innerWidth !== currentWidth) {
                    currentWidth = window.innerWidth;
                    location.reload();
                }
            }, 200);
        });
    </script>
</body>
</html>
