<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jordan Hilliard | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --spacing: 15px; /* Equal gutters between all images */
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            -webkit-font-smoothing: antialiased;
        }

        /* Navbar Styling */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px;
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.98);
            z-index: 100;
        }

        .nav-left a, .nav-right a {
            text-decoration: none;
            color: var(--text-color);
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .nav-left a { font-size: 1.2rem; font-weight: 700; }
        .nav-right { display: flex; gap: 25px; align-items: center; }
        .nav-right a:hover { opacity: 0.5; }

        /* The Masonry Container: Holds 3 vertical columns */
        #work-container {
            display: flex;
            flex-direction: row;
            gap: var(--spacing);
            padding: 0 var(--spacing) var(--spacing) var(--spacing);
            max-width: 2400px; /* Expands for large displays */
            margin: 0 auto;
        }

        /* Individual Vertical Columns */
        .column {
            display: flex;
            flex-direction: column;
            gap: var(--spacing);
            flex: 1; /* Ensures columns stay equal width */
            min-width: 0; /* Prevents overflow issues */
        }

        .project-item {
            opacity: 0; /* Starts hidden for the fade-in effect */
            transform: translateY(20px);
            transition: opacity 0.8s cubic-bezier(0.2, 0, 0.2, 1), 
                        transform 0.8s cubic-bezier(0.2, 0, 0.2, 1);
        }

        .project-item img {
            width: 100%;
            height: auto;
            display: block;
            /* Optional: subtle hover zoom */
            transition: transform 0.4s ease;
        }

        .project-item:hover img {
            transform: scale(1.01);
        }

        /* Fade-in Class */
        .project-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Responsive: Tablet (2 columns) & Mobile (1 column) */
        @media (max-width: 1000px) {
            #col-2 { display: none; } /* Hide 3rd column */
        }

        @media (max-width: 700px) {
            #col-1 { display: none; } /* Hide 2nd column */
            nav { 
                padding: 20px; 
                flex-direction: column; 
                gap: 20px; 
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <a href="index.html">Jordan Hilliard</a>
        </div>
        <div class="nav-right">
            <a href="index.html">Selected Work</a>
            <a href="about.html">About</a>
            <a href="mailto:YOUR_EMAIL@GMAIL.COM" title="Email"><i class="fa-solid fa-envelope"></i></a>
            <a href="https://www.linkedin.com/in/YOUR_PROFILE" target="_blank" title="LinkedIn"><i class="fa-brands fa-linkedin"></i></a>
        </div>
    </nav>

    <main id="work-container">
        <div class="column" id="col-0"></div>
        <div class="column" id="col-1"></div>
        <div class="column" id="col-2"></div>
    </main>

    <script>
        const username = 'JDHilliard-lab';
        const repo = 'jordanhilliartportfolio';

        async function loadImages() {
            try {
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/images`);
                const files = await response.json();
                
                // Sort 001, 002, 003...
                files.sort((a, b) => a.name.localeCompare(b.name));

                // Filter for .webp only
                const webpFiles = files.filter(f => f.name.toLowerCase().endsWith('.webp'));

                // Determine how many columns are currently visible
                const getColumnCount = () => {
                    if (window.innerWidth <= 700) return 1;
                    if (window.innerWidth <= 1000) return 2;
                    return 3;
                };

                const columnCount = getColumnCount();

                webpFiles.forEach((file, index) => {
                    const div = document.createElement('div');
                    div.className = 'project-item';
                    div.innerHTML = `<img src="${file.download_url}" loading="lazy" alt="Portfolio Piece">`;
                    
                    // Logic to distribute images into visible columns
                    const targetCol = index % columnCount;
                    document.getElementById(`col-${targetCol}`).appendChild(div);
                    
                    // Start observing for fade-in
                    observer.observe(div);
                });
            } catch (e) {
                console.error("GitHub API Error:", e);
            }
        }

        // Fade-in Logic
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1 });

        // Run on load
        loadImages();

        // Refresh page on resize to redistribute images for responsive columns
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                location.reload();
            }, 250);
        });
    </script>
</body>
</html>
