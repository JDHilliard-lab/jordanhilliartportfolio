<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jordan Hilliard | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* GLOBAL RESET */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            -webkit-font-smoothing: antialiased;
        }
        * { box-sizing: border-box; }

        :root {
            --spacing: 15px;
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --nav-height: 100px;
            --row-height: 450px; /* This controls how tall the image rows are on Desktop */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        /* SYNCED NAVBAR */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: var(--nav-height);
            padding: 0 40px;
            position: sticky;
            top: 0;
            background: white;
            z-index: 1000;
        }

        .nav-left a, .nav-right a {
            text-decoration: none;
            color: var(--text-color);
            font-weight: 700;
            font-size: 1rem;
        }

        .nav-left a { font-size: 1.2rem; }
        .nav-right { display: flex; gap: 25px; align-items: center; }
        .nav-right a:hover { opacity: 0.5; }

        /* --- THE FLUID ROW GALLERY --- */
        #portfolio-main {
            max-width: 2400px;
            margin: 0 auto;
            padding: 0 var(--spacing) 60px var(--spacing);
        }

        /* Creates a visual break between different projects instead of using text */
        .group-section {
            margin-bottom: 80px; 
        }

        .work-container {
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing);
        }

        /* Invisible trick: Stops the last row from stretching massively if there are only 1 or 2 images left */
        .work-container::after {
            content: "";
            flex-grow: 10;
        }

        .project-item {
            flex-grow: 1;
            flex-shrink: 1;
            height: var(--row-height);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
            min-width: 15%; /* Prevents images from getting crushed too thin */
        }

        .project-item img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures flush edges */
            display: block;
        }

        .project-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* RESPONSIVE: Shrink the row height on smaller screens */
        @media (max-width: 1000px) {
            :root { --row-height: 300px; } 
        }

        @media (max-width: 700px) { 
            :root { --row-height: 250px; } 
            nav { padding: 0 20px; height: 80px; }
            .nav-left a { font-size: 1rem; }
            .nav-right { gap: 15px; }
            .nav-right a { font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-left"><a href="index.html">Jordan Hilliard</a></div>
        <div class="nav-right">
            <a href="index.html">Work</a>
            <a href="about.html">About</a>
            <a href="mailto:jordanhilliard@gmail.com"><i class="fa-solid fa-envelope"></i></a>
            <a href="https://www.linkedin.com/in/jordan-hilliard-50a4322/" target="_blank"><i class="fa-brands fa-linkedin"></i></a>
        </div>
    </nav>

    <main id="portfolio-main"></main>

    <script>
        const username = 'JDHilliard-lab';
        const repo = 'jordanhilliartportfolio';

        async function loadImages() {
            try {
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/images`);
                const files = await response.json();
                
                // Sort files numerically left-to-right
                files.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));

                // FILTER: Only .webp files AND NOT portrait.webp
                const webpFiles = files.filter(f => 
                    f.name.toLowerCase().endsWith('.webp') && 
                    f.name.toLowerCase() !== 'portrait.webp'
                );

                // --- GROUP FILES BY PROJECT (No Text Titles) ---
                const groups = {};
                webpFiles.forEach(file => {
                    const lowerName = file.name.toLowerCase();
                    let groupName = 'Other Work'; 

                    // Add your project tags here just like before
                    if (lowerName.includes('ford')) { groupName = 'Ford'; }
                    else if (lowerName.includes('aloft')) { groupName = 'Aloft'; }
                    else if (lowerName.includes('ey')) { groupName = 'EY'; }

                    if (!groups[groupName]) { groups[groupName] = []; }
                    groups[groupName].push(file);
                });

                const mainContainer = document.getElementById('portfolio-main');

                // --- RENDER EACH GROUP AS A FLUID BLOCK ---
                for (const [groupName, groupFiles] of Object.entries(groups)) {
                    
                    const section = document.createElement('div');
                    section.className = 'group-section'; // This adds the invisible space between projects
                    
                    const grid = document.createElement('div');
                    grid.className = 'work-container';
                    
                    groupFiles.forEach((file) => {
                        const div = document.createElement('div');
                        div.className = 'project-item';
                        div.innerHTML = `<img src="${file.download_url}" alt="${file.name}">`;
                        
                        grid.appendChild(div);
                        observer.observe(div);
                    });

                    section.appendChild(grid);
                    mainContainer.appendChild(section);
                }

            } catch (e) { console.error(e); }
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
        }, { threshold: 0.1 });

        loadImages();

        // Kept the mobile address bar fix so your phone doesn't freeze!
        let currentWidth = window.innerWidth;
        let rt;
        window.addEventListener('resize', () => {
            clearTimeout(rt);
            rt = setTimeout(() => {
                if (window.innerWidth !== currentWidth) {
                    currentWidth = window.innerWidth;
                    location.reload();
                }
            }, 200);
        });
    </script>
</body>
</html>
