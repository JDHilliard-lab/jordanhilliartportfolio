<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jordan Hilliard | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* GLOBAL RESET */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            -webkit-font-smoothing: antialiased;
        }
        * { box-sizing: border-box; }

        :root {
            --spacing: 15px;
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --nav-height: 100px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        /* SYNCED NAVBAR */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: var(--nav-height);
            padding: 0 40px;
            position: sticky;
            top: 0;
            background: white;
            z-index: 1000;
        }

        .nav-left a, .nav-right a {
            text-decoration: none;
            color: var(--text-color);
            font-weight: 700;
            font-size: 1rem;
        }

        .nav-left a { font-size: 1.2rem; }
        .nav-right { display: flex; gap: 25px; align-items: center; }
        .nav-right a:hover { opacity: 0.5; }

        /* --- NEW GROUPING STYLES --- */
        #portfolio-main {
            max-width: 2400px;
            margin: 0 auto;
            padding-bottom: 60px;
        }

        .group-section {
            margin-bottom: 60px; /* Space between different projects */
        }

        .group-title {
            padding: 0 var(--spacing);
            font-size: 1.5rem;
            margin-top: 40px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #555; /* Slightly muted text for the project titles */
        }

        /* REVERTED TO LEFT-TO-RIGHT FLEXBOX */
        .work-container {
            display: flex;
            flex-direction: row;
            gap: var(--spacing);
            padding: 0 var(--spacing);
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: var(--spacing);
            flex: 1;
            min-width: 0;
        }

        .project-item {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        .project-item img {
            width: 100%;
            height: auto; 
            display: block;
        }

        .project-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* RESPONSIVE */
        @media (max-width: 700px) { 
            nav { padding: 0 20px; height: 80px; }
            .nav-left a { font-size: 1rem; }
            .nav-right { gap: 15px; }
            .nav-right a { font-size: 0.85rem; }
            .group-title { font-size: 1.2rem; margin-top: 20px;}
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-left"><a href="index.html">Jordan Hilliard</a></div>
        <div class="nav-right">
            <a href="index.html">Work</a>
            <a href="about.html">About</a>
            <a href="mailto:jordanhilliard@gmail.com"><i class="fa-solid fa-envelope"></i></a>
            <a href="https://www.linkedin.com/in/jordan-hilliard-50a4322/" target="_blank"><i class="fa-brands fa-linkedin"></i></a>
        </div>
    </nav>

    <main id="portfolio-main"></main>

    <script>
        const username = 'JDHilliard-lab';
        const repo = 'jordanhilliartportfolio';

        async function loadImages() {
            try {
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/images`);
                const files = await response.json();
                
                // Sort files to maintain your 001, 002 order
                files.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));

                // FILTER: Only .webp files AND NOT portrait.webp
                const webpFiles = files.filter(f => 
                    f.name.toLowerCase().endsWith('.webp') && 
                    f.name.toLowerCase() !== 'portrait.webp'
                );

                // --- NEW: GROUP THE FILES BY PROJECT NAME ---
                const groups = {};
                webpFiles.forEach(file => {
                    const lowerName = file.name.toLowerCase();
                    let groupName = 'Other Work'; // Fallback if no tag matches

                    // Add your project tags here! 
                    if (lowerName.includes('ford')) { groupName = 'Ford'; }
                    else if (lowerName.includes('aloft')) { groupName = 'Aloft'; }
                    else if (lowerName.includes('ey')) { groupName = 'EY'; }
                    // Example: else if (lowerName.includes('kitbash')) { groupName = 'KitBash3D'; }

                    // Create the array for the group if it doesn't exist yet
                    if (!groups[groupName]) { groups[groupName] = []; }
                    groups[groupName].push(file);
                });

                const getColCount = () => {
                    if (window.innerWidth <= 700) return 1;
                    if (window.innerWidth <= 1000) return 2;
                    return 3;
                };

                const columnCount = getColCount();
                const mainContainer = document.getElementById('portfolio-main');

                // --- RENDER EACH GROUP ---
                for (const [groupName, groupFiles] of Object.entries(groups)) {
                    
                    // 1. Create the Section and Title
                    const section = document.createElement('div');
                    section.className = 'group-section';
                    
                    const title = document.createElement('h2');
                    title.className = 'group-title';
                    title.textContent = groupName;
                    section.appendChild(title);

                    // 2. Create the Grid and Columns for this specific project
                    const grid = document.createElement('div');
                    grid.className = 'work-container';
                    
                    const columns = [];
                    for (let i = 0; i < columnCount; i++) {
                        const col = document.createElement('div');
                        col.className = 'column';
                        columns.push(col);
                        grid.appendChild(col);
                    }

                    // 3. Deal the images left-to-right into the columns
                    groupFiles.forEach((file, index) => {
                        const div = document.createElement('div');
                        div.className = 'project-item';
                        div.innerHTML = `<img src="${file.download_url}" alt="${file.name}">`;
                        
                        const targetCol = index % columnCount;
                        columns[targetCol].appendChild(div);
                        
                        observer.observe(div);
                    });

                    // 4. Put it all together on the page
                    section.appendChild(grid);
                    mainContainer.appendChild(section);
                }

            } catch (e) { console.error(e); }
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
        }, { threshold: 0.1 });

        loadImages();

        // Kept your mobile address bar fix!
        let currentWidth = window.innerWidth;
        let rt;
        window.addEventListener('resize', () => {
            clearTimeout(rt);
            rt = setTimeout(() => {
                if (window.innerWidth !== currentWidth) {
                    currentWidth = window.innerWidth;
                    location.reload();
                }
            }, 200);
        });
    </script>
</body>
</html>
