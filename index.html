<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jordan Hilliard | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* GLOBAL RESET */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            overflow-x: hidden; 
            -webkit-font-smoothing: antialiased;
        }
        * { box-sizing: border-box; }

        :root {
            --spacing: 15px;
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --nav-height: 100px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        /* SYNCED NAVBAR */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: var(--nav-height);
            padding: 0 40px;
            position: sticky;
            top: 0;
            background: white;
            z-index: 1000;
        }

        .nav-left a, .nav-right a {
            text-decoration: none;
            color: var(--text-color);
            font-weight: 700;
            font-size: 1rem;
        }

        .nav-left a { font-size: 1.2rem; }
        .nav-right { display: flex; gap: 25px; align-items: center; }
        .nav-right a:hover { opacity: 0.5; }

        /* EQUAL ROW GRID */
        #work-grid {
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing);
            padding: var(--spacing);
            max-width: 2400px;
            margin: 0 auto;
        }

        .project-item {
            flex: 1 1 calc(33.333% - var(--spacing)); 
            max-width: calc(33.333% - var(--spacing));
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
            display: flex; 
            align-items: center;
        }

        .project-item img {
            width: 100%;
            height: 25vw; /* Keeps the row height identical */
            object-fit: cover; 
            display: block;
        }

        .project-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* MOBILE FIXES */
        @media (max-width: 1000px) {
            .project-item { 
                flex: 1 1 calc(50% - var(--spacing)); 
                max-width: calc(50% - var(--spacing)); 
            }
            .project-item img { height: 40vw; }
        }

        @media (max-width: 700px) { 
            nav { padding: 0 20px; height: 80px; }
            .nav-left a { font-size: 1rem; }
            .nav-right { gap: 15px; }
            .nav-right a { font-size: 0.85rem; }
            .project-item { 
                flex: 1 1 100%; 
                max-width: 100%; 
            }
            .project-item img { height: auto; } 
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-left"><a href="index.html">Jordan Hilliard</a></div>
        <div class="nav-right">
            <a href="index.html">Work</a>
            <a href="about.html">About</a>
            <a href="mailto:jordanhilliard@gmail.com"><i class="fa-solid fa-envelope"></i></a>
            <a href="https://www.linkedin.com/in/jordan-hilliard-50a4322/" target="_blank"><i class="fa-brands fa-linkedin"></i></a>
        </div>
    </nav>
    <main id="work-grid"></main>
    <script>
        const username = 'JDHilliard-lab';
        const repo = 'jordanhilliartportfolio';
        async function loadImages() {
            const grid = document.getElementById('work-grid');
            try {
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/images`);
                const files = await response.json();
                files.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));
                files.forEach(file => {
                    if (file.name.toLowerCase().endsWith('.webp')) {
                        const div = document.createElement('div');
                        div.className = 'project-item';
                        div.innerHTML = `<img src="${file.download_url}" alt="${file.name}">`;
                        grid.appendChild(div);
                        observer.observe(div);
                    }
                });
            } catch (e) { console.error(e); }
        }
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
        }, { threshold: 0.1 });
        loadImages();
    </script>
</body>
</html>
