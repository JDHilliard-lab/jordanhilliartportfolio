<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jordan Hilliard | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* GLOBAL RESET */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            -webkit-font-smoothing: antialiased;
        }
        * { box-sizing: border-box; }

        :root {
            --spacing: 15px;
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --nav-height: 100px;
            --row-height: 450px; 
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        /* SYNCED NAVBAR */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: var(--nav-height);
            padding: 0 40px;
            position: sticky;
            top: 0;
            background: white;
            z-index: 1000;
        }

        .nav-left a, .nav-right a {
            text-decoration: none;
            color: var(--text-color);
            font-weight: 700;
            font-size: 1rem;
        }

        .nav-left a { font-size: 1.2rem; }
        .nav-right { display: flex; gap: 25px; align-items: center; }
        .nav-right a:hover { opacity: 0.5; }

        /* --- THE FLUID ROW GALLERY --- */
        #portfolio-main {
            max-width: 2400px;
            margin: 0 auto;
            padding: 0 var(--spacing) 60px var(--spacing);
        }

        /* Removed the large gap. Groups now sit close together. */
        .group-section {
            margin-bottom: var(--spacing); 
        }

        .work-container {
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing);
        }

        /* Prevents the last row from stretching too wide */
        .work-container::after {
            content: "";
            flex-grow: 10;
        }

        .project-item {
            flex-grow: 1;
            flex-shrink: 1;
            height: var(--row-height);
            opacity: 0;
            transform: translateY(20px);
            /* Added background-color to the transition for a smooth fade-in */
            transition: opacity 0.8s ease-out, transform 0.8s ease-out, background-color 0.5s ease;
            min-width: 15%; 
            background-color: #f0f0f0; /* Default fallback color */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .project-item img {
            width: 100%;
            height: 100%;
            /* NO CROPPING. Image scales to fit inside the box. */
            object-fit: contain; 
            display: block;
        }

        .project-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* RESPONSIVE */
        @media (max-width: 1000px) {
            :root { --row-height: 350px; } 
        }

        @media (max-width: 700px) { 
            :root { --row-height: 250px; } 
            nav { padding: 0 20px; height: 80px; }
            .nav-left a { font-size: 1rem; }
            .nav-right { gap: 15px; }
            .nav-right a { font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-left"><a href="index.html">Jordan Hilliard</a></div>
        <div class="nav-right">
            <a href="index.html">Work</a>
            <a href="about.html">About</a>
            <a href="mailto:jordanhilliard@gmail.com"><i class="fa-solid fa-envelope"></i></a>
            <a href="https://www.linkedin.com/in/jordan-hilliard-50a4322/" target="_blank"><i class="fa-brands fa-linkedin"></i></a>
        </div>
    </nav>

    <main id="portfolio-main"></main>

    <script>
        const username = 'JDHilliard-lab';
        const repo = 'jordanhilliartportfolio';

        async function loadImages() {
            try {
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/images`);
                const files = await response.json();
                
                // Sort files numerically
                files.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));

                // FILTER: Only .webp files AND NOT portrait.webp
                const webpFiles = files.filter(f => 
                    f.name.toLowerCase().endsWith('.webp') && 
                    f.name.toLowerCase() !== 'portrait.webp'
                );

                const groups = {};
                webpFiles.forEach(file => {
                    const lowerName = file.name.toLowerCase();
                    let groupName = 'Other Work'; 

                    if (lowerName.includes('ford')) { groupName = 'Ford'; }
                    else if (lowerName.includes('aloft')) { groupName = 'Aloft'; }
                    else if (lowerName.includes('ey')) { groupName = 'EY'; }

                    if (!groups[groupName]) { groups[groupName] = []; }
                    groups[groupName].push(file);
                });

                const mainContainer = document.getElementById('portfolio-main');

                for (const [groupName, groupFiles] of Object.entries(groups)) {
                    
                    const section = document.createElement('div');
                    section.className = 'group-section'; 
                    
                    const grid = document.createElement('div');
                    grid.className = 'work-container';
                    
                    groupFiles.forEach((file) => {
                        const div = document.createElement('div');
                        div.className = 'project-item';
                        
                        // Create the image element dynamically
                        const img = document.createElement('img');
                        img.crossOrigin = "Anonymous"; // Allows us to read the image colors
                        img.src = file.download_url;
                        img.alt = file.name;

                        // THE MAGIC TRICK: Once the image loads, grab its average color
                        img.onload = function() {
                            try {
                                const canvas = document.createElement('canvas');
                                canvas.width = 1;
                                canvas.height = 1;
                                const ctx = canvas.getContext('2d');
                                ctx.drawImage(img, 0, 0, 1, 1);
                                const data = ctx.getImageData(0, 0, 1, 1).data;
                                // Set the background to a slightly softened version of the image's average color
                                div.style.backgroundColor = `rgba(${data[0]}, ${data[1]}, ${data[2]}, 0.8)`;
                            } catch (e) {
                                // Failsafe: if GitHub blocks the color read, it just stays the default gray
                                console.warn("Color read blocked by browser security.", e);
                            }
                        };

                        div.appendChild(img);
                        grid.appendChild(div);
                        observer.observe(div);
                    });

                    section.appendChild(grid);
                    mainContainer.appendChild(section);
                }

            } catch (e) { console.error(e); }
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
        }, { threshold: 0.1 });

        loadImages();

        // Kept the mobile resize fix!
        let currentWidth = window.innerWidth;
        let rt;
        window.addEventListener('resize', () => {
            clearTimeout(rt);
            rt = setTimeout(() => {
                if (window.innerWidth !== currentWidth) {
                    currentWidth = window.innerWidth;
                    location.reload();
                }
            }, 200);
        });
    </script>
</body>
</html>
